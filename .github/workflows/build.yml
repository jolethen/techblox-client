name: Build Android APK

on:
  release:
    types: [published]
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'

      - name: Set up Android SDK & NDK
        uses: android-actions/setup-android@v3

      - name: Install NDK & CMake
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"

      - name: Make Gradle Wrapper Executable
        run: |
          if [ -f "./android/gradlew" ]; then
            chmod +x ./android/gradlew
          elif [ -f "./build/android/gradlew" ]; then
            chmod +x ./build/android/gradlew
          elif [ -f "./gradlew" ]; then
            chmod +x ./gradlew
          fi

      - name: Build Android Release APK
        run: |
          if [ -d "./android" ]; then
            cd ./android
            ./gradlew assembleRelease
          elif [ -d "./build/android" ]; then
            cd ./build/android
            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Find and Prepare APK
        run: |
          APK_PATH=$(find . -name "*.apk" | head -n 1)
          if [ -z "$APK_PATH" ]; then
            echo "No APK found!"
            exit 1
          fi
          echo "Found APK at $APK_PATH"
          mkdir -p build_output
          cp "$APK_PATH" build_output/Luanti-release.apk

      # Saves the APK as a downloadable ZIP artifact on manual workflow_dispatch runs
      - name: Upload APK Artifact (Manual Runs)
        uses: actions/upload-artifact@v4
        if: github.event_name == 'workflow_dispatch'
        with:
          name: Luanti-release-apk
          path: build_output/Luanti-release.apk
          retention-days: 7

      # Attaches the APK directly to the Release when published
      - name: Upload APK to GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'release'
        with:
          files: build_output/Luanti-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
