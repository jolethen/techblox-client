name: Build and Publish Client Release

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*' # Triggers a release whenever you push a version tag like v1.0
  workflow_dispatch: # Allows manual trigger anytime from the Actions tab

jobs:
  build-and-release:
    runs-on: ubuntu-22.04
    permissions:
      contents: write # Grants GitHub permission to publish Releases and upload APK assets
    steps:
      - name: Checkout repository and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends gettext

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build Fast ARM64 APK with Gradle
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug -Pandroid.injected.build.abi=arm64-v8a

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/debug/*.apk
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('build-{0}', github.run_number) }}
          name: Techblox Client ${{ github.ref_type == 'tag' && github.ref_name || format('Build #{0}', github.run_number) }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
